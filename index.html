<!DOCTYPE html>

<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VirtualBank Simulator</title>

```
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
```

</head>

<body>

<!-- LOGIN -->

<div id="login-container" class="login-wrapper">
    <div class="login-card">
        <h1>VirtualBank</h1>

```
    <input type="text" id="login-username" placeholder="Логін">
    <input type="password" id="login-password" placeholder="Пароль">
    <button id="login-btn">Увійти</button>

    <hr>

    <input type="text" id="reg-username" placeholder="Новий логін">
    <input type="password" id="reg-password" placeholder="Новий пароль">
    <button id="register-btn">Створити акаунт</button>
</div>
```

</div>

<!-- APP -->

<div id="app-container" style="display:none;">

```
<!-- SIDEBAR -->
<div class="sidebar">
    <h2>💰 Bank</h2>

    <button onclick="navigate('dashboard')">🏠 Головна</button>
    <button onclick="navigate('crypto')">🪙 Крипто</button>
    <button onclick="navigate('stocks')">📈 Акції</button>
    <button onclick="navigate('business')">🏢 Бізнес</button>
    <button onclick="navigate('realty')">🏝️ Нерухомість</button>
    <button onclick="navigate('cars')">🚗 Авто</button>
    <button onclick="navigate('transfer')">💸 Перекази</button>

    <button id="admin-panel-btn" style="display:none;">👑 Адмін</button>
    <button id="logout-btn">🚪 Вийти</button>
</div>

<!-- MAIN -->
<div class="main">

    <div class="top">
        👤 <span id="username-display"></span> |
        ⭐ <span id="status-text"></span>
    </div>

    <div class="balance">
        💰 <span id="main-balance">0</span> грн |
        💵 <span id="usd-balance">0</span> USD
    </div>

    <div id="page-content"></div>

    <button id="click-btn">КЛІК</button>

</div>
```

</div>

<script src="script.js"></script>

</body>
</html>
