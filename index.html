<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VirtualBank Simulator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="login-container" class="login-wrapper">
        <div class="glass-card login-card">
            <div class="logo-area">
                <i class="fas fa-chart-line"></i>
                <h1>Virtual<span>Bank</span></h1>
                <p>симулятор фінансової гри</p>
            </div>
            <div class="tabs">
                <button class="tab-btn active" data-tab="login">Вхід</button>
                <button class="tab-btn" data-tab="register">Реєстрація</button>
            </div>
            <div id="login-form" class="auth-form active">
                <input type="text" id="login-username" placeholder="Логін">
                <input type="password" id="login-password" placeholder="Пароль">
                <button id="login-btn" class="btn-primary">Увійти</button>
                <div class="demo-info">Новий акаунт: +500 грн
            </div>
            <div id="register-form" class="auth-form">
                <input type="text" id="reg-username" placeholder="Логін">
                <input type="password" id="reg-password" placeholder="Пароль">
                <button id="register-btn" class="btn-primary">Створити</button>
            </div>
        </div>
    </div>

    <div id="app-container" style="display: none;">
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-coins"></i>
                <span>VirtualBank</span>
            </div>
            <nav class="sidebar-nav">
                <button data-page="dashboard"><i class="fas fa-tachometer-alt"></i> Головна</button>
                <button data-page="crypto"><i class="fab fa-bitcoin"></i> Крипто</button>
                <button data-page="stocks"><i class="fas fa-chart-line"></i> Акції</button>
                <button data-page="business"><i class="fas fa-store"></i> Бізнес</button>
                <button data-page="realty"><i class="fas fa-umbrella-beach"></i> Острови</button>
                <button data-page="cars"><i class="fas fa-car"></i> Авто</button>
                <button data-page="classes"><i class="fas fa-star-of-life"></i> Класи</button>
                <button data-page="transfer"><i class="fas fa-exchange-alt"></i> Перекази</button>
                <button data-page="history"><i class="fas fa-history"></i> Історія</button>
                <button data-page="donate"><i class="fas fa-hand-holding-heart"></i> Підтримка</button>
                <button data-page="top"><i class="fas fa-trophy"></i> Топ 100</button>
                <button id="admin-panel-btn" style="display: none;"><i class="fas fa-crown"></i> Адмін</button>
                <button id="logout-btn"><i class="fas fa-sign-out-alt"></i> Вихід</button>
            </nav>
        </div>
        <div class="main-content">
            <div class="top-bar">
                <div class="user-info">
                    <span><i class="fas fa-user"></i> <span id="username-display"></span></span>
                    <span class="status-badge"><i class="fas fa-shield-alt"></i> <span id="status-text"></span></span>
                    <button id="change-pin-btn" class="small-btn">Змінити PIN</button>
                    <button id="change-card-name-btn" class="small-btn">Назва карти</button>
                    <button id="change-card-color-btn" class="small-btn">Колір картки</button>
                    <button id="vip-giveaway-btn" class="small-btn vip-giveaway" style="display: none;">VIP-роздача</button>
                    <button id="lang-toggle-btn" class="small-btn"><i class="fas fa-language"></i> EN</button>
                    <button id="sound-toggle-btn" class="small-btn"><i class="fas fa-volume-up"></i></button>
                </div>
                <div class="balance-card">
                    <span>💰 Баланс:</span>
                    <strong id="main-balance">0</strong> грн
                    <span style="margin-left: 10px;">💵 USD:</span>
                    <strong id="usd-balance">0</strong> USD
                </div>
            </div>
            <div id="page-content" class="page-container"></div>
            <div class="clicker-area" id="clicker-area">
                <button id="click-button" class="click-btn">
                    <i class="fab fa-bitcoin"></i>
                    <span>КЛІК</span>
                </button>
            </div>
        </div>
    </div>

    <div id="color-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Оберіть колір картки</h3>
            <div class="color-options">
                <div class="color-option black" data-color="black"></div>
                <div class="color-option yellow" data-color="yellow"></div>
                <div class="color-option white" data-color="white"></div>
                <div class="color-option gold" data-color="gold" id="gold-option" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
