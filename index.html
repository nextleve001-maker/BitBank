<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BitBank</title>

  <link rel="stylesheet" href="style.css?v=400">

</head>
<body>
  <div id="login-screen" class="auth-screen">
    <div class="auth-box">
      <div class="auth-header">
        <h1>BitBank</h1>
        <p>Crypto • Business • Casino • Battle</p>
      </div>

      <div class="auth-tabs">
        <button id="tab-login" class="auth-tab active" type="button">Login</button>
        <button id="tab-register" class="auth-tab" type="button">Register</button>
      </div>

      <div id="auth-message" class="auth-message"></div>

      <div id="login-form" class="auth-form">
        <label for="login-username">Username</label>
        <input id="login-username" type="text" placeholder="Enter username" autocomplete="username" />

        <label for="login-password">Password</label>
        <input id="login-password" type="password" placeholder="Enter password" autocomplete="current-password" />

        <button id="login-btn" type="button" class="primary-btn">Login</button>
      </div>

      <div id="register-form" class="auth-form hidden">
        <label for="register-username">Username</label>
        <input id="register-username" type="text" placeholder="Create username" autocomplete="username" />

        <label for="register-password">Password</label>
        <input id="register-password" type="password" placeholder="Create password" autocomplete="new-password" />

        <button id="register-btn" type="button" class="primary-btn">Register</button>
      </div>
    </div>
  </div>

  <div id="app-screen" class="app-screen hidden">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="brand-block">
          <h2>BitBank</h2>
          <p>Online Idle Economy</p>
        </div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-btn" data-page="profile" type="button">👤 Profile</button>
        <button class="nav-btn" data-page="business" type="button">🏢 Business</button>
        <button class="nav-btn" data-page="crypto" type="button">🪙 Crypto</button>
        <button class="nav-btn" data-page="stocks" type="button">📈 Stocks</button>
        <button class="nav-btn" data-page="realty" type="button">🏝 Realty</button>
        <button class="nav-btn" data-page="cars" type="button">🚗 Cars</button>
        <button class="nav-btn" data-page="inventory" type="button">🎒 Inventory</button>
        <button class="nav-btn" data-page="market" type="button">🛒 Market</button>
        <button class="nav-btn" data-page="friends" type="button">👥 Friends</button>
        <button class="nav-btn" data-page="battle" type="button">⚔️ Battle</button>
        <button class="nav-btn" data-page="casino" type="button">🎰 Casino</button>
        <button class="nav-btn" data-page="transfers" type="button">💸 Transfers</button>
        <button class="nav-btn" data-page="card" type="button">💳 Card</button>
        <button class="nav-btn" data-page="history" type="button">📜 History</button>
        <button class="nav-btn" data-page="stats" type="button">📊 Stats</button>
        <button class="nav-btn" data-page="admin" type="button">👑 Admin</button>
      </nav>

      <div class="sidebar-bottom">
        <button id="logout-btn" type="button" class="danger-btn">Logout</button>
      </div>
    </aside>

    <main class="main-layout">
      <header class="topbar">
        <div class="topbar-left">
          <h1 id="header-username">Player</h1>
          <div class="top-meta">
            <span id="header-status">Class: none</span>
            <span id="header-device">Device: desktop</span>
          </div>
        </div>

        <div class="topbar-right">
          <div class="balance-chip">
            <span>UAH</span>
            <strong id="balance-uah">₴ 0</strong>
          </div>
          <div class="balance-chip">
            <span>USD</span>
            <strong id="balance-usd">$ 0</strong>
          </div>
        </div>
      </header>

      <section class="content-wrap">
        <div id="global-message" class="global-message"></div>

        <div id="battle-widget"></div>

        <div id="page-content" class="page-content">
          <div class="card">
            <h2>Loading...</h2>
            <p>BitBank is starting.</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
