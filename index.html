<!DOCTYPE html>
            <div id="login-form" class="auth-form active">
                <input type="text" id="login-username" placeholder="Логін">
                <input type="password" id="login-password" placeholder="Пароль">
                <button id="login-btn" class="btn-primary" data-i18n="loginBtn">Увійти</button>
                <div class="demo-info">Новий акаунт: +500 грн | Адмін: creator / 9creator9</div>
            </div>

            <div id="register-form" class="auth-form">
                <input type="text" id="reg-username" placeholder="Логін">
                <input type="password" id="reg-password" placeholder="Пароль">
                <button id="register-btn" class="btn-primary" data-i18n="registerBtn">Створити</button>
            </div>
        </div>
    </div>

    <div id="app-container" style="display: none;">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-coins"></i>
                <span>BitBank</span>
            </div>

            <nav class="sidebar-nav">
                <button data-page="dashboard"><i class="fas fa-tachometer-alt"></i><span data-i18n="navDashboard">Головна</span></button>
                <button data-page="crypto"><i class="fab fa-bitcoin"></i><span data-i18n="navCrypto">Крипто</span></button>
                <button data-page="stocks"><i class="fas fa-chart-line"></i><span data-i18n="navStocks">Акції</span></button>
                <button data-page="business"><i class="fas fa-store"></i><span data-i18n="navBusiness">Бізнес</span></button>
                <button data-page="realty"><i class="fas fa-house"></i><span data-i18n="navRealty">Нерухомість</span></button>
                <button data-page="cars"><i class="fas fa-car"></i><span data-i18n="navCars">Авто</span></button>
                <button data-page="classes"><i class="fas fa-star"></i><span data-i18n="navClasses">Класи</span></button>
                <button data-page="transfer"><i class="fas fa-exchange-alt"></i><span data-i18n="navTransfer">Перекази</span></button>
                <button data-page="history"><i class="fas fa-history"></i><span data-i18n="navHistory">Історія</span></button>
                <button data-page="donate"><i class="fas fa-hand-holding-heart"></i><span data-i18n="navDonate">Підтримка</span></button>
                <button data-page="top"><i class="fas fa-trophy"></i><span data-i18n="navTop">Топ 100</span></button>
                <button id="admin-panel-btn" style="display:none;"><i class="fas fa-crown"></i><span data-i18n="navAdmin">Адмін</span></button>
                <button id="logout-btn"><i class="fas fa-sign-out-alt"></i><span data-i18n="navLogout">Вихід</span></button>
            </nav>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <div class="user-info">
                    <span><i class="fas fa-user"></i> <span id="username-display"></span></span>
                    <span class="status-badge"><i class="fas fa-shield-alt"></i> <span id="status-text"></span></span>
                    <button id="change-pin-btn" class="small-btn" data-i18n="changePin">Змінити PIN</button>
                    <button id="change-card-name-btn" class="small-btn" data-i18n="changeCardName">Назва карти</button>
                    <button id="change-card-color-btn" class="small-btn" data-i18n="changeCardColor">Колір картки</button>
                    <button id="vip-giveaway-btn" class="small-btn vip-giveaway" style="display:none;" data-i18n="vipGiveaway">VIP-роздача</button>
                    <button id="lang-toggle-btn" class="small-btn"><i class="fas fa-language"></i> EN</button>
                    <button id="sound-toggle-btn" class="small-btn"><i class="fas fa-volume-up"></i></button>
                </div>
                <div class="balance-card">
                    <span>💰 <span data-i18n="balanceLabel">Баланс</span>:</span>
                    <strong id="main-balance">0</strong> грн
                    <span style="margin-left: 10px;">💵 USD:</span>
                    <strong id="usd-balance">0</strong> USD
                </div>
            </div>

            <div id="page-content" class="page-container"></div>

            <div class="clicker-area" id="clicker-area">
                <button id="click-button" class="click-btn">
                    <i class="fab fa-bitcoin"></i>
                    <span data-i18n="clickButton">КЛІК</span>
                </button>
            </div>
        </main>
    </div>

    <div id="color-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 data-i18n="chooseCardColor">Оберіть колір картки</h3>
            <div class="color-options">
                <div class="color-option black" data-color="black"></div>
                <div class="color-option yellow" data-color="yellow"></div>
                <div class="color-option white" data-color="white"></div>
                <div class="color-option gold" data-color="gold" id="gold-option" style="display:none;"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
