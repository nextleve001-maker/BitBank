<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BitBank</title>

  <link rel="stylesheet" href="style.css?v=500" />
</head>
<body>
  <!-- AUTH -->
  <div id="login-screen" class="auth-screen">
    <div class="auth-box">
      <div class="auth-header">
        <h1>BitBank</h1>
        <p>Digital bank • crypto • economy • premium dashboard</p>
      </div>

      <div class="auth-tabs">
        <button id="tab-login" class="auth-tab active" type="button">Login</button>
        <button id="tab-register" class="auth-tab" type="button">Register</button>
      </div>

      <div id="auth-message" class="auth-message"></div>

      <div id="login-form" class="auth-form">
        <label for="login-username">Username</label>
        <input
          id="login-username"
          type="text"
          placeholder="Enter username"
          autocomplete="username"
        />

        <label for="login-password">Password</label>
        <input
          id="login-password"
          type="password"
          placeholder="Enter password"
          autocomplete="current-password"
        />

        <button id="login-btn" class="primary-btn" type="button">Login</button>
      </div>

      <div id="register-form" class="auth-form hidden">
        <label for="register-username">Username</label>
        <input
          id="register-username"
          type="text"
          placeholder="Create username"
          autocomplete="username"
        />

        <label for="register-password">Password</label>
        <input
          id="register-password"
          type="password"
          placeholder="Create password"
          autocomplete="new-password"
        />

        <button id="register-btn" class="primary-btn" type="button">Register</button>
      </div>
    </div>
  </div>

  <!-- APP -->
  <div id="app-screen" class="app-screen hidden">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="brand-block">
          <h2>BitBank</h2>
          <p>Premium economy platform</p>
        </div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-btn" data-page="profile" type="button">👤 Profile</button>
        <button class="nav-btn" data-page="business" type="button">🏢 Business</button>
        <button class="nav-btn" data-page="crypto" type="button">🪙 Crypto</button>
        <button class="nav-btn" data-page="stocks" type="button">📈 Stocks</button>
        <button class="nav-btn" data-page="realty" type="button">🏝 Realty</button>
        <button class="nav-btn" data-page="cars" type="button">🚗 Cars</button>
        <button class="nav-btn" data-page="inventory" type="button">🎒 Inventory</button>
        <button class="nav-btn" data-page="friends" type="button">👥 Friends</button>
        <button class="nav-btn" data-page="battle" type="button">⚔️ Battle</button>
        <button class="nav-btn" data-page="casino" type="button">🎰 Casino</button>
        <button class="nav-btn" data-page="transfers" type="button">💸 Transfers</button>
        <button class="nav-btn" data-page="card" type="button">💳 Card</button>
        <button class="nav-btn" data-page="history" type="button">📜 History</button>
        <button class="nav-btn" data-page="stats" type="button">📊 Stats</button>
        <button class="nav-btn" data-page="admin" type="button">👑 Admin</button>
      </nav>

      <div class="sidebar-bottom">
        <button id="logout-btn" class="danger-btn" type="button">Logout</button>
      </div>
    </aside>

    <main class="main-layout">
      <header class="topbar">
        <div class="topbar-left">
          <h1 id="header-username">Player</h1>

          <div class="top-meta">
            <span id="header-status">Class: none</span>
            <span id="header-device">Device: desktop</span>
          </div>
        </div>

        <div class="topbar-right">
         <select id="lang-switcher">
    <option value="ua">UA</option>
      <option value="en">EN</option>
        <option value="fr">FR</option>
        <option value="it">IT</option>
          </select>
            <div class="balance-chip">
                <span>UAH</span>
                <strong id="balance-uah">₴ 0</strong>
            </div>

          <div class="balance-chip">
            <span>USD</span>
            <strong id="balance-usd">$ 0</strong>
          </div>
        </div>
      </header>

      <section class="content-wrap">
        <div id="global-message" class="global-message"></div>

        <div id="battle-widget"></div>

        <div id="page-content" class="page-content">
          <div class="card" style="grid-column:1 / -1;">
            <h2>Loading...</h2>
            <p>BitBank is starting.</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <link rel="stylesheet" href="style.css?v=902  ">
<script type="module" src="./app.js?v=902"></script>
</body>
</html>
