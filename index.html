<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BitBank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="login-screen" class="screen">
    <div class="auth-card">
      <div class="brand">
        <div class="brand-icon">₿</div>
        <div>
          <h1>BitBank</h1>
          <p id="auth-subtitle">Симулятор фінансової гри</p>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="login">Вхід</button>
        <button class="tab-btn" data-tab="register">Реєстрація</button>
      </div>

      <div id="login-form" class="tab-pane active">
        <input id="login-username" type="text" placeholder="Логін" />
        <input id="login-password" type="password" placeholder="Пароль" />
        <button id="login-btn" class="primary-btn">Увійти</button>
        <div class="hint">500+ за вхід 
      </div>

      <div id="register-form" class="tab-pane">
        <input id="reg-username" type="text" placeholder="Логін" />
        <input id="reg-password" type="password" placeholder="Пароль" />
        <button id="register-btn" class="primary-btn">Створити</button>
      </div>
    </div>
  </div>

  <div id="app-screen" class="screen hidden">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-top">
        <div class="brand small">
          <div class="brand-icon">₿</div>
          <div>
            <h2>BitBank</h2>
            <p>online game</p>
          </div>
        </div>
        <button id="sidebar-close" class="icon-btn mobile-only">✕</button>
      </div>

      <nav class="nav">
        <button data-page="dashboard" class="nav-btn active">🏠 <span data-i18n="menu_profile">Профіль</span></button>
        <button data-page="crypto" class="nav-btn">🪙 <span data-i18n="menu_crypto">Крипто</span></button>
        <button data-page="stocks" class="nav-btn">📈 <span data-i18n="menu_stocks">Акції</span></button>
        <button data-page="business" class="nav-btn">🏢 <span data-i18n="menu_business">Бізнес</span></button>
        <button data-page="realty" class="nav-btn">🏝️ <span data-i18n="menu_realty">Нерухомість</span></button>
        <button data-page="cars" class="nav-btn">🚗 <span data-i18n="menu_cars">Авто</span></button>
        <button data-page="classes" class="nav-btn">⭐ <span data-i18n="menu_classes">Класи</span></button>
        <button data-page="friends" class="nav-btn">👥 <span data-i18n="menu_friends">Друзі</span></button>
        <button data-page="battle" class="nav-btn">⚔️ <span data-i18n="menu_battle">Дуель</span></button>
        <button data-page="casino" class="nav-btn">🎰 <span data-i18n="menu_casino">Казино</span></button>
        <button data-page="transfer" class="nav-btn">💸 <span data-i18n="menu_transfer">Перекази</span></button>
        <button data-page="history" class="nav-btn">🕓 <span data-i18n="menu_history">Історія</span></button>
        <button data-page="top" class="nav-btn">🏆 <span data-i18n="menu_top">Топ 100</span></button>
        <button data-page="donate" class="nav-btn">❤️ <span data-i18n="menu_support">Підтримка</span></button>
        <button id="admin-nav" data-page="admin" class="nav-btn hidden">👑 <span data-i18n="menu_admin">Адмін</span></button>
      </nav>

      <div class="sidebar-bottom">
        <button id="logout-btn" class="danger-btn">Вийти</button>
      </div>
    </aside>

    <div id="overlay" class="overlay"></div>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button id="sidebar-open" class="icon-btn mobile-only">☰</button>
          <div class="user-chip">
            <span id="header-username">user</span>
            <span id="header-status" class="pill">NONE</span>
            <span id="header-online" class="pill green">ONLINE</span>
            <span id="header-device" class="pill cyan">🖥 ПК</span>
          </div>
        </div>

        <div class="topbar-actions">
          <button id="change-pin-btn" class="soft-btn">Змінити PIN</button>
          <button id="change-card-name-btn" class="soft-btn">Назва карти</button>
          <button id="change-card-color-btn" class="soft-btn">Колір картки</button>
          <button id="vip-giveaway-btn" class="soft-btn gold hidden">VIP-роздача</button>
          <button id="toggle-sound-btn" class="soft-btn">🔊 Звук</button>
          <button id="lang-btn" class="soft-btn">EN</button>
        </div>

        <div class="balance-box">
          <span>💰 <b id="balance-uah">0</b> грн</span>
          <span class="sep">|</span>
          <span>💵 <b id="balance-usd">0</b> USD</span>
        </div>
      </header>

      <section id="global-message" class="message hidden"></section>
      <section id="page-content" class="content"></section>

      <button id="click-btn" class="click-btn">КЛІК</button>
    </main>
  </div>

  <div id="color-modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h3>Оберіть колір картки</h3>
        <button class="icon-btn" id="close-color-modal">✕</button>
      </div>
      <div class="color-grid">
        <button class="color-option black" data-color="black"></button>
        <button class="color-option white" data-color="white"></button>
        <button class="color-option yellow" data-color="yellow"></button>
        <button class="color-option gold" data-color="gold"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
